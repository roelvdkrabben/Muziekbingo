<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MuziekBingo · Card Background Designer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,700&family=Bodoni+Moda:ital,wght@0,400;0,700;0,900;1,700&family=DM+Serif+Display:ital@0;1&family=Abril+Fatface&family=Cinzel:wght@400;700;900&family=IM+Fell+DW+Pica:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Anton&family=Bebas+Neue&family=Archivo+Black&family=Big+Shoulders+Display:wght@400;700;900&family=Bungee&family=Monoton&family=Limelight&family=Rye&family=Caveat:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inconsolata:wght@400;700&family=Unifraktur+Cook:wght@700&family=Pirata+One&family=Cormorant+Unicase:wght@500;700&family=Tangerine:wght@400;700&display=swap">

<style>
  :root{
    --paper:#f5f1ea; --paper-2:#ece6dc; --ink:#1c1a18; --ink-2:#3a3530;
    --muted:#857c70; --line:#dcd3c4; --line-strong:#bcae98;
    --accent:#b8312e; --accent-2:#1a3d6b; --ok:#3f7a3f;
    --shadow: 0 1px 0 rgba(28,26,24,.04), 0 12px 28px -12px rgba(28,26,24,.18);
  }
  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; overflow:hidden; }
  body{
    font-family: "DM Sans", system-ui, sans-serif;
    background: var(--paper); color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  #root{ height:100vh; width:100vw; }

  .serif{ font-family: "Instrument Serif", "Playfair Display", Georgia, serif; }
  .mono{ font-family: "JetBrains Mono", ui-monospace, monospace; }

  .topbar{
    height:56px; flex:none;
    display:flex; align-items:center; gap:14px;
    padding: 0 18px;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
  }
  .brand{ display:flex; align-items:baseline; gap:8px; }
  .brand .mark{
    width:24px; height:24px; border-radius:50%;
    background: var(--ink); color: var(--paper);
    display:grid; place-items:center;
    font-family:"Instrument Serif", serif; font-style:italic; font-size:16px;
    transform: translateY(2px);
  }
  .brand h1{
    font-family:"Instrument Serif", serif; font-weight:400;
    font-size: 18px; letter-spacing: -0.01em; margin:0;
  }
  .brand h1 em{ font-style: italic; color: var(--accent); }
  .brand .sub{
    font-family:"JetBrains Mono", monospace;
    font-size: 9px; color: var(--muted); text-transform:uppercase; letter-spacing: 0.14em;
    padding-left: 10px; border-left: 1px solid var(--line); margin-left: 2px;
  }
  .topbar .grow{ flex:1; }
  .topbtn{
    appearance:none; border: 1px solid var(--line-strong); background: var(--paper);
    color: var(--ink); padding: 7px 12px; border-radius: 999px;
    font-family: "DM Sans", sans-serif; font-size: 12px; font-weight: 500;
    cursor:pointer; transition: all .15s ease;
    display:inline-flex; align-items:center; gap:6px;
  }
  .topbtn:hover{ background: var(--paper-2); }
  .topbtn.primary{ background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .topbtn.primary:hover{ background: #000; }
  .topbtn.success{ background: var(--ok); color: #fff; border-color: var(--ok); }
  .topbtn:disabled{ opacity:.5; cursor: progress; }

  .layout{
    display:grid; grid-template-columns: 1fr 380px;
    height: calc(100vh - 56px); min-height: 0;
  }
  .stage{
    position:relative;
    background: radial-gradient(1200px 800px at 50% 30%, #efe7d8, var(--paper-2) 70%);
    overflow:hidden; display:flex; align-items:center; justify-content:center;
    padding: 30px;
  }
  .stage-inner{
    position:relative; transform-origin: center center;
    transition: transform .25s ease;
    filter: drop-shadow(0 30px 50px rgba(28,26,24,.18)) drop-shadow(0 4px 8px rgba(28,26,24,.08));
  }
  .a4{ width: 2480px; height: 3508px; background: white; position:relative; overflow:hidden; }
  .a4 svg{ display:block; width:100%; height:100%; }
  .stage-chrome{
    position:absolute; top:12px; left:12px; right:12px;
    display:flex; align-items:center; gap:8px; pointer-events:none;
    font-family:"JetBrains Mono", monospace; font-size:10px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.16em;
  }
  .stage-chrome .pill{
    background: var(--paper); border:1px solid var(--line);
    padding: 4px 8px; border-radius: 999px; pointer-events: auto;
  }
  .stage-chrome .grow{ flex:1; }
  .zoom-controls{
    position:absolute; bottom:14px; left:50%; transform: translateX(-50%);
    display:flex; gap:5px; align-items:center;
    background: var(--paper); border:1px solid var(--line); border-radius: 999px;
    padding: 4px 7px; box-shadow: var(--shadow);
    font-family:"JetBrains Mono", monospace; font-size:10px;
  }
  .zoom-controls button{
    appearance:none; border:0; background:transparent; color:var(--ink);
    width:24px; height:24px; border-radius:999px; cursor:pointer;
    font-family:"JetBrains Mono", monospace; font-size:13px;
  }
  .zoom-controls button:hover{ background: var(--paper-2); }
  .zoom-controls .num{ width:50px; text-align:center; color: var(--ink-2); }

  .inspector{
    border-left: 1px solid var(--line); background: var(--paper);
    overflow-y: auto; overflow-x: hidden;
  }
  .inspector::-webkit-scrollbar{ width: 8px; }
  .inspector::-webkit-scrollbar-thumb{ background: var(--line-strong); border-radius: 999px; border: 2px solid var(--paper);}

  .made-by{
    display: flex; align-items: center; gap: 7px; padding: 14px 18px 18px;
    color: var(--muted); font-size: 10px; letter-spacing: 0.1em; opacity: 0.55;
  }
  .made-by-logo{ height: 14px; width: auto; filter: grayscale(1); opacity: 0.7; }

  .preset-grid{
    display:grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px 14px;
    border-bottom: 1px solid var(--line);
  }
  .preset-card{
    border:1px solid var(--line); border-radius: 8px; overflow: hidden; cursor:pointer;
    background: white; transition: all .15s ease; aspect-ratio: 1.414/1; position:relative;
  }
  .preset-card:hover{ transform: translateY(-1px); box-shadow: var(--shadow); border-color: var(--line-strong); }
  .preset-card.active{ outline: 2px solid var(--ink); outline-offset: 2px; }
  .preset-card .label{
    position:absolute; left:6px; bottom:5px;
    font-family: "Instrument Serif", serif; font-size: 11px; line-height: 1;
    color: var(--ink); background: rgba(245,241,234,.92); padding: 2px 5px; border-radius: 3px;
  }
  details.section{ border-bottom: 1px solid var(--line); }
  details.section > summary{
    list-style:none; cursor:pointer; padding: 12px 16px;
    display:flex; align-items:center; gap:8px; user-select:none;
  }
  details.section > summary::-webkit-details-marker{ display:none; }
  details.section > summary .caret{
    width:10px; height:10px; border-right: 1.5px solid var(--ink-2); border-bottom: 1.5px solid var(--ink-2);
    transform: rotate(-45deg); transition: transform .2s; margin-left: 2px;
  }
  details.section[open] > summary .caret{ transform: rotate(45deg); }
  details.section > summary .title{
    font-family: "Instrument Serif", serif; font-weight: 400; font-size: 16px;
    letter-spacing: -0.01em; flex: 1;
  }
  details.section > summary .badge{
    font-family: "JetBrains Mono", monospace; font-size: 8px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.18em;
  }
  .section-body{ padding: 4px 16px 16px; display:flex; flex-direction:column; gap: 10px; }
  .field{ display:flex; flex-direction:column; gap: 5px; }
  .field-row{ display:flex; align-items:center; gap: 8px; }
  .label{
    font-family:"JetBrains Mono", monospace; font-size:9px;
    text-transform: uppercase; letter-spacing: 0.16em; color: var(--muted);
  }
  .label.inline{ flex: 1; }
  input[type="text"], textarea, select{
    appearance:none; -webkit-appearance:none; border: 1px solid var(--line-strong);
    background: white; color: var(--ink); border-radius: 6px; padding: 7px 9px;
    font-family: "DM Sans", sans-serif; font-size: 12px; width:100%; transition: border-color .15s;
  }
  input[type="text"]:focus, textarea:focus, select:focus{ outline:none; border-color: var(--ink); }
  .slider-row{ display:flex; align-items:center; gap: 8px; }
  .slider-row input[type="range"]{ flex:1; }
  .slider-row .num{ font-family:"JetBrains Mono", monospace; font-size: 10px; color: var(--ink-2); min-width: 32px; text-align:right; }
  input[type="range"]{
    -webkit-appearance:none; appearance:none; background: transparent; height: 16px; width: 100%;
  }
  input[type="range"]::-webkit-slider-runnable-track{ height: 2px; background: var(--line-strong); border-radius: 999px; }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance: none; appearance:none; width: 12px; height: 12px; border-radius: 50%;
    background: var(--ink); margin-top: -5px; cursor: pointer; border: 2px solid var(--paper);
    box-shadow: 0 0 0 1px var(--ink);
  }
  input[type="range"]::-moz-range-track{ height: 2px; background: var(--line-strong); border-radius: 999px; }
  input[type="range"]::-moz-range-thumb{ width:11px; height:11px; border-radius:50%; background: var(--ink); border: 2px solid var(--paper); box-shadow: 0 0 0 1px var(--ink); cursor:pointer; }
  .segmented{
    display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;
    border: 1px solid var(--line-strong); border-radius: 999px; background: white; overflow:hidden; height: 28px;
  }
  .segmented button{
    appearance:none; border:0; background: transparent;
    font-family: "DM Sans", sans-serif; font-size: 10px; font-weight:500;
    color: var(--ink-2); cursor:pointer; padding: 0 3px; transition: background .15s;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .segmented button.active{ background: var(--ink); color: var(--paper); }
  .segmented button:not(.active):hover{ background: var(--paper-2); }
  .swatch-row{ display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .swatch{
    position:relative; aspect-ratio: 1; border-radius: 7px;
    border: 1px solid rgba(28,26,24,.15); overflow:hidden; cursor:pointer; transition: transform .15s;
  }
  .swatch:hover{ transform: scale(1.04); }
  .swatch input[type="color"]{ position:absolute; inset:0; opacity:0; width:100%; height:100%; cursor:pointer; border:0; }
  .swatch .hex{
    position:absolute; left:3px; bottom:3px;
    font-family: "JetBrains Mono", monospace; font-size: 7.5px;
    color: rgba(255,255,255,.92); background: rgba(0,0,0,.4); padding: 1px 3px; border-radius: 2px; pointer-events:none;
  }
  .swatch.light .hex{ color: rgba(0,0,0,.85); background: rgba(255,255,255,.7); }
  .chip-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
  .chip{
    appearance:none; cursor:pointer; border: 1px solid var(--line-strong); background: white;
    border-radius: 7px; padding: 7px 5px;
    font-family: "DM Sans", sans-serif; font-size: 10px; color: var(--ink-2);
    transition: all .15s; display:flex; flex-direction:column; align-items:center; gap:3px; text-transform: capitalize;
  }
  .chip:hover{ background: var(--paper-2); }
  .chip.active{ background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .chip svg{ width: 26px; height: 20px; }
  .toggle{
    width:32px; height:18px; border-radius:999px; background: var(--line-strong);
    position:relative; cursor:pointer; transition: background .15s; flex:none;
  }
  .toggle::after{
    content:""; position:absolute; top:2px; left:2px; width:14px; height:14px;
    background: white; border-radius:50%; transition: transform .15s; box-shadow: 0 1px 2px rgba(0,0,0,.15);
  }
  .toggle.on{ background: var(--ink); }
  .toggle.on::after{ transform: translateX(14px); }
  .hint{ font-family:"JetBrains Mono", monospace; font-size:9px; color: var(--muted); line-height:1.4; }
  .toast{
    position:fixed; left:50%; bottom:24px;
    transform: translateX(-50%);
    background: var(--ok); color: #fff;
    padding: 9px 14px; border-radius: 999px;
    font-family:"DM Sans", sans-serif; font-size: 12px;
    box-shadow: 0 18px 40px rgba(0,0,0,.25); z-index: 50;
    opacity: 0; transform: translateX(-50%) translateY(20px);
    transition: all .25s; pointer-events:none;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }
  .status-bar{
    position:fixed; bottom:0; left:0; right:0;
    background: var(--ok); color:#fff;
    display:flex; align-items:center; justify-content:center; gap:12px;
    padding: 10px 20px; font-size:13px; font-family:"DM Sans",sans-serif;
    transform: translateY(100%); transition: transform .3s ease;
    z-index:100;
  }
  .status-bar.show{ transform: translateY(0); }
  .status-bar button{ background:rgba(255,255,255,.25); border:1px solid rgba(255,255,255,.5); color:#fff; padding:4px 12px; border-radius:999px; cursor:pointer; font-family:"DM Sans",sans-serif; font-size:12px; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Streamlit component communication (raw postMessage protocol) -->
<script>
  window.StreamlitAPI = {
    _ready: false,
    send: function(type, data) {
      window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type: 'streamlit:' + type }, data), '*');
    },
    setReady: function() {
      if (this._ready) return;
      this._ready = true;
      this.send('componentReady', { apiVersion: 1 });
      this.setHeight(900);
    },
    setHeight: function(h) {
      this.send('setFrameHeight', { height: h });
    },
    setValue: function(value) {
      this.send('componentValue', { value: value });
    }
  };
  window.addEventListener('load', function() {
    setTimeout(function() { window.StreamlitAPI.setReady(); }, 200);
  });
</script>
